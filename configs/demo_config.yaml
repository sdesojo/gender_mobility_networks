app_name: demo_mobility_metrics

job_spark:
    n_workers: 2
    temp_folder: /tmp/spark_demo
    checkpoint_folder: /tmp/spark_demo_checkpoint
    mem: 4g
    verbose: True

paths:
    compute_mobility_metrics:
        input_path:             data/demo/stops/
        demographics_path:      data/demo/demographics/
        output_networks_path:   data/demo/output/networks/
        output_metrics_path:    data/demo/output/metrics/
        output_all_metrics_path: data/demo/output/
        output_filename:        "user_metrics_demo.csv"

    compute_seq_tours:
        input_path:             data/demo/stops/
        demographics_path:      data/demo/demographics/
        output_seqeff_path:     data/demo/output/seq_eff/
        output_tour_path:       data/demo/output/tours/
        output_dffinal_path:    data/demo/output/
        output_seqeff_filename: "user_seqeff_demo.csv"
        output_tour_filename:   "user_tours_demo.csv"

aggregation:
    base_cols: ["useruuid", "gender", "GID_0"]
    demo_cols: ["gender", "GID_0"]
    time_sort_cols: ["start"]
    time_agg_cols: ["start_month"]
    get_OD_netw: False
    get_allmet_pdf: True
    suffix: ""

home_work_detection:
    get_howde: True
    params_config:
        range_window_home: 28
        range_window_work: 42
        C_hours: 0.4
        C_days_H: 0.4
        C_days_W: 0.5
        f_hours_H: 0.7
        f_hours_W: 0.4
        f_days_W: 0.6
        is_time_local: True
        data_for_predict: False
        min_stop_t: 60
        start_hour_day: 6
        end_hour_day: 24
        start_hour_work: 8
        end_hour_work: 18
        output_format: "stop"
        verbose: False

metrics:
    mobility_metrics: ["visits", "locations", "total_stay_time", "total_travel_time", "total_cost_travel_distance", "total_reward_home_distance", "tour_efficiency_dist"]
    mobility_aux_metrics: ["has_home", "coverage_stay_time", "sum_home_distance", "max_home_distance", "max_reward_home_distance"]
    network_metrics: ["nodes", "edges", "density", "avg_unw_cluster", "n_cycles", "top1_degree_centrality", "global_efficiency_edges"]
    network_aux_metrics: ["top2_degree_centrality", "top3_degree_centrality", "avg_len_cycles_all", "n_cycles_per_edge"]
    efficiency_metrics: ["nwide_MFPT_lovasz", "home_GMFPT_lovasz", "global_efficiency_distance"]

sequnces_tours:
    get_efficiency: True

anonymization:
    enabled: False
    method: "order"  